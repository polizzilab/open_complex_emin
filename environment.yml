name: protonator
channels:
  - conda-forge
dependencies:
  - python=3.12
  # AmberTools provides antechamber + parmchk2 (GAFF2 atom typing)
  - ambertools
  # openff-toolkit-base is the core toolkit WITHOUT the optional openff-nagl
  # neural-network charge model — which would otherwise pull in pytorch and a
  # full CUDA toolkit (~1 GB). We use GFN2-xTB charges (tblite), not NAGL.
  - openff-toolkit-base
  - openmm
  - rdkit
  # GFN2-xTB partial charges (tblite = C library, tblite-python = Python bindings)
  - tblite
  - tblite-python
  # remaining runtime deps (all on conda-forge)
  - parmed
  - prody
  - lxml
  - networkx
  - cachetools
  - pint
  - scipy
  - tinydb
  - typer
  - pytest
  - pip
  - pip:
      - python-constraint
      # bunsalyze (fast track H-bond geometry) is NOT on PyPI and pulls freesasa.
      # It is installed separately by setup.sh after the env is created:
      #   conda activate protonator && ./setup.sh
